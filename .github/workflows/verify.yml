name: Ecosystem Pipeline Verification

on:
  push:
    branches: [ main, master, devel ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify-build-matrix:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Source Code Matrix
      uses: actions/checkout@v4

    - name: Initialize System Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Testing Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest

    - name: Setup Native Zig Toolchain Compiler
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.11.0

    - name: Verify Workspace Directory Provisioning (init)
      run: make -f web4.mk init

    - name: Run Manifest Package Evaluation Strategy
      run: |
        chmod +x scripts/parse_registry.py
        python scripts/parse_registry.py

    - name: Execute Native Shared Block Compilation Targets
      run: make -f web4.mk build

    - name: Run Global Automated Workspace Tests
      run: make -f web4.mk test
